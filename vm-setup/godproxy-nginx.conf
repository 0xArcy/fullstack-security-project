# /vm-setup/godproxy-nginx.conf
# This acts as our "Godproxy" - an ultimate secure gatekeeper

# 1. Rate Limiting Zone to prevent DDoS and Brute Force attacks
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # SSL Configuration (assuming certs are generated via Let's Encrypt / Certbot)
    ssl_certificate /etc/ssl/certs/godproxy.crt;
    ssl_certificate_key /etc/ssl/private/godproxy.key;
    
    # Modern SSL parameters
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 2. Inject Security Headers (Alignment with Security Assessment)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self';" always;

    # Remove Nginx version from error pages and headers
    server_tokens off;

    # 3. Frontend App Serving (React/Vite)
    location / {
        root /var/www/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 4. Proxy/Route to Backend API VM
    location /api/ {
        # Apply rate limiting to API
        limit_req zone=api_limit burst=20 nodelay;

        # Replace backend_vm_ip with the actual internal IP of VM 2
        proxy_pass http://<backend_vm_ip>:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}